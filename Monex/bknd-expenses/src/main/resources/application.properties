spring.application.name=bknd-expenses

server.port=8083

# Base de datos propia del microservicio de gastos
spring.datasource.url=jdbc:mysql://localhost:3306/gastos?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Mostrar errores durante desarrollo
server.error.include-stacktrace=always
server.error.include-message=always

# JWT
# Debe ser exactamente igual al secret del microservicio de usuarios y categorías
jwt.secret=clave-super-secreta-para-testeo-1234567890
jwt.expiration=86400000