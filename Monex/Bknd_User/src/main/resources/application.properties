spring.application.name=Bknd_User
#Conector
spring.datasource.url=jdbc:mysql://localhost:3306/usuarios?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#Configuracion repo JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

#mostrar errores
spring.web.error.include-stacktrace=always
spring.web.error.include-message=always

#JWT
jwt.secret=clave-super-secreta-para-testeo-1234567890
jwt.expiration=86400000